server:
  port: ${PRODUCT_SERVICE_PORT:19400}

spring:
  application:
    name: ${PRODUCT_SERVICE_NAME:product-service}

  datasource:
    url: jdbc:postgresql://lucky-postgres:5432/${POSTGRES_DB:lucky_logistics}?currentSchema=${PRODUCT_SERVICE_SCHEMA:product_schema}
    username: ${POSTGRES_USER:lucky}
    password: ${POSTGRES_PASSWORD:lucky7777}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${PRODUCT_SERVICE_SCHEMA:product_schema}
    show-sql: true
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://lucky-keycloak:8080/realms/lucky}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://lucky-keycloak:8080/realms/lucky/protocol/openid-connect/certs}

eureka:
  client:
    service-url:
      defaultZone: http://lucky-eureka:19090/eureka
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000