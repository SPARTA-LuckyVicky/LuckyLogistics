server:
  port: 19090

spring:
  application:
    name: eureka-server

eureka:
  client:
    # Eureka Server 자신은 등록/조회 불필요
    register-with-eureka: false
    fetch-registry: false
  server:
    # 개발 환경에서 자기보호 모드 비활성화 (서비스 내려도 즉시 해제됨)
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health  # docker-compose healthcheck용