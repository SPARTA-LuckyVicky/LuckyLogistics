spring.application.name=delivery-service

# Database
spring.datasource.url = jdbc:postgresql://localhost:5432/${POSTGRES_DB}?currentSchema=delivery_schema
spring.datasource.username = ${POSTGRES_USER}
spring.datasource.password = ${POSTGRES_PASSWORD}
spring.datasource.driver-class-name = org.postgresql.Driver

# security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/lucky
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://lucky-keycloak:8080/realms/lucky/protocol/openid-connect/certs

# sql init
spring.sql.init.mode=never

# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=delivery_schema

# JPA
spring.jpa.hibernate.ddl-auto = validate
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=delivery_schema
#spring.jpa.defer-datasource-initialization=true

# Eureka
eureka.client.service-url.defaultZone = http://localhost:19090/eureka/
eureka.client.register-with-eureka = true
eureka.client.fetch-registry=true
eureka.instance.hostname=delivery-service
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90
