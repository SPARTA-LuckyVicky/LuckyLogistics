server:
  port: 19000 # Gateway 포트

  spring:
    application:
      name: api-gateway
    cloud:
      gateway:
        server:
          webflux:
            default-filters:
              - name: JwtAuthenticationFilter # 모든 라우터 필터 적용

            routes:
              # User Service 라우팅
              - id: user-service
                uri: lb://USER-SERVICE # Eureka에 등록된 서비스 이름
                predicates:
                  - Path=/api/v1/auth/**, /api/v1/users/**

              # Hub Service 라우팅
              - id: hub-service
                uri: lb://HUB-SERVICE
                predicates:
                  - Path=/api/v1/hubs/**, /internal/api/v1/hubs/**

              # Company Service 라우팅
              - id: company-service
                uri: lb://COMPANY-SERVICE
                predicates:
                  - Path=/api/v1/companies/**, /internal/api/v1/companies/**

              # Order Service 라우팅
              - id: order-service
                uri: lb://ORDER-SERVICE
                predicates:
                  - Path=/api/v1/orders/**, /internal/api/v1/orders/**

              # Notification Service 라우팅
              - id: notification-service
                uri: lb://NOTIFICATION-SERVICE
                predicates:
                  - Path=/api/v1/notifications/**, /internal/api/v1/notifications/**

              # Delivery Service 라우팅
              - id: delivery-service
                uri: lb://DELIVERY-SERVICE
                predicates:
                  - Path=/api/v1/deliveries/**, /api/v1/admin/deliveries/**, /internal/api/v1/deliveries/**

              # Product Service 라우팅
              - id: product-service
                uri: lb://PRODUCT-SERVICE
                predicates:
                  - Path=/api/v1/products/**, /internal/api/v1/products/**

            discovery:
              locator:
                enabled: true # 서비스 디스커버리를 통한 동적 라우팅 허용


eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/ # Eureka 서버 주소
  instance:
    prefer-ip-address: true
jwt:
  secret:
    key: ${JWT_SECRET_KEY}