server:
  port: ${NOTIFICATION_SERVICE_PORT:19700}

spring:
  application:
    name: ${NOTIFICATION_SERVICE_NAME:notification-service}

  datasource:
    url: jdbc:postgresql://lucky-postgres:5432/${POSTGRES_DB:lucky_logistics}?currentSchema=${NOTIFICATION_SERVICE_SCHEMA:notification_schema}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${NOTIFICATION_SERVICE_SCHEMA:notification_schema}
    show-sql: true

  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0

gemini:
  api:
    key: ${GEMINI_API_KEY}

slack:
  token: ${SLACK_TOKEN}