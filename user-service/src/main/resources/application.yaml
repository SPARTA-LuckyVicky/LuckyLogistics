server:
  port: ${USER_SERVICE_PORT}

spring:
  application:
    name: ${USER_SERVICE_NAME}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/lucky
          jwk-set-uri: http://lucky-keycloak:8080/realms/lucky/protocol/openid-connect/certs


  datasource:
    url: jdbc:postgresql://lucky-postgres:5432/${POSTGRES_DB}?currentSchema=${USER_SERVICE_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${USER_SERVICE_SCHEMA}
    show-sql: true

  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://lucky-eureka:19090/eureka
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
