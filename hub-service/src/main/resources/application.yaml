server:
  port: ${HUB_SERVICE_PORT}

spring:
  application:
    name: ${HUB_SERVICE_NAME}

  datasource:
    url: jdbc:postgresql://lucky-postgres:5432/${POSTGRES_DB}?currentSchema=${HUB_SERVICE_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${HUB_SERVICE_SCHEMA}
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: ${HUB_SERVICE_SCHEMA}
    validate-on-migrate: false

  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://lucky-eureka:19090/eureka
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html