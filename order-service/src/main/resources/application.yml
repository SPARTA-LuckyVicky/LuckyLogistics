server:
  port: ${ORDER_SERVICE_PORT:19500}

spring:
  application:
    name: ${ORDER_SERVICE_NAME:order-service}

  cloud:
    openfeign:
      okhttp:
        enabled: true

  datasource:
    url: jdbc:postgresql://lucky-postgres:5432/${POSTGRES_DB:lucky_logistics}?currentSchema=${ORDER_SERVICE_SCHEMA:order_schema}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${ORDER_SERVICE_SCHEMA:order_schema}
    show-sql: true

  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/lucky}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://lucky-keycloak:8080/realms/lucky/protocol/openid-connect/certs}
eureka:
  client:
    service-url:
      defaultZone: http://lucky-eureka:19090/eureka
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://lucky-zipkin:9411/api/v2/spans  # 추가

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000