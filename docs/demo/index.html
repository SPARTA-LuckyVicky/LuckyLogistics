<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Logistics — API Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Pretendard:wght@300;400;500;600&display=swap');

        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --surface2: #1a1d24;
            --border: #2a2d36;
            --accent: #4f8ef7;
            --accent2: #22c55e;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text: #e8eaf0;
            --muted: #6b7280;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Pretendard', sans-serif;

            --role-company: #f59e0b;
            --role-hub: #22c55e;
            --role-delivery: #a78bfa;
            --role-master: #4f8ef7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            min-height: 100vh;
            display: grid;
            grid-template-rows: 56px 52px 1fr;
            grid-template-columns: 260px 1fr 380px;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
        }
        .logo { font-family: var(--mono); font-weight: 600; font-size: 15px; color: var(--accent); }
        .logo span { color: var(--muted); }
        .badge {
            font-family: var(--mono); font-size: 11px; padding: 2px 8px;
            border-radius: 4px; background: rgba(79,142,247,0.12);
            color: var(--accent); border: 1px solid rgba(79,142,247,0.25);
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .server-status { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-left:auto; }

        /* ROLE TABS */
        .role-tabs {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: stretch;
            padding: 0 16px;
            gap: 4px;
        }
        .role-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .role-tab:hover { color: var(--text); }
        .role-tab.active { color: var(--text); }
        .role-tab.active.company  { border-color: var(--role-company); color: var(--role-company); }
        .role-tab.active.hub      { border-color: var(--role-hub);     color: var(--role-hub); }
        .role-tab.active.delivery { border-color: var(--role-delivery);color: var(--role-delivery); }
        .role-tab.active.master   { border-color: var(--role-master);  color: var(--role-master); }

        .role-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .company  .role-dot { background: var(--role-company); }
        .hub      .role-dot { background: var(--role-hub); }
        .delivery .role-dot { background: var(--role-delivery); }
        .master   .role-dot { background: var(--role-master); }

        .role-count {
            font-family: var(--mono); font-size: 10px;
            padding: 1px 6px; border-radius: 10px;
            background: var(--surface2);
        }

        /* SIDEBAR */
        aside {
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px 0;
        }
        .api-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 16px; cursor: pointer;
            transition: background 0.15s;
            border-left: 2px solid transparent;
        }
        .api-item:hover { background: var(--surface2); }
        .api-item.active { background: rgba(79,142,247,0.07); }
        .api-item.active.company-item  { border-color: var(--role-company); }
        .api-item.active.hub-item      { border-color: var(--role-hub); }
        .api-item.active.delivery-item { border-color: var(--role-delivery); }
        .api-item.active.master-item   { border-color: var(--role-master); }

        .method {
            font-family: var(--mono); font-size: 10px; font-weight: 600;
            padding: 2px 5px; border-radius: 3px; min-width: 38px; text-align: center;
        }
        .GET    { background: rgba(34,197,94,0.15);  color: #22c55e; }
        .POST   { background: rgba(79,142,247,0.15); color: #4f8ef7; }
        .PATCH  { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .DELETE { background: rgba(239,68,68,0.15);  color: #ef4444; }

        .api-name { font-size: 12px; color: var(--text); line-height: 1.3; }
        .api-desc { font-size: 10px; color: var(--muted); }

        .step-badge {
            margin-left: auto;
            font-family: var(--mono); font-size: 10px;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .company-item  .step-badge { background: rgba(245,158,11,0.15); color: var(--role-company); }
        .hub-item      .step-badge { background: rgba(34,197,94,0.15);  color: var(--role-hub); }
        .delivery-item .step-badge { background: rgba(167,139,250,0.15);color: var(--role-delivery); }
        .master-item   .step-badge { background: rgba(79,142,247,0.15); color: var(--role-master); }

        /* MAIN */
        main { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .panel-header {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 16px; border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .panel-title { font-family: var(--mono); font-size: 12px; color: var(--muted); }
        .panel-body { padding: 16px; }

        .url-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 9px 14px; margin-bottom: 12px;
        }
        .url-path { font-family: var(--mono); font-size: 12px; color: var(--text); flex: 1; }

        .headers-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .headers-table th {
            font-family: var(--mono); font-size: 10px; color: var(--muted);
            text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--border);
        }
        .headers-table td { font-family: var(--mono); font-size: 11px; padding: 5px 8px; border-bottom: 1px solid rgba(42,45,54,0.5); }
        .hkey { color: var(--accent); }
        .hval { color: #a78bfa; }

        .body-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
        .code-block {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 12px 14px;
            font-family: var(--mono); font-size: 12px; line-height: 1.8;
            white-space: pre; overflow-x: auto; color: var(--text);
        }
        .jkey { color: #7dd3fc; }
        .jstr { color: #86efac; }
        .jnum { color: #fbbf24; }

        .send-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; margin-top: 14px; padding: 11px;
            border: none; border-radius: 6px;
            font-family: var(--sans); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; color: white;
        }
        .send-btn.company-btn  { background: var(--role-company); }
        .send-btn.hub-btn      { background: var(--role-hub); }
        .send-btn.delivery-btn { background: var(--role-delivery); }
        .send-btn.master-btn   { background: var(--role-master); }
        .send-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .send-btn:active { transform: translateY(0); }
        .send-btn.loading { background: var(--surface2) !important; color: var(--muted); cursor: not-allowed; }
        .spinner { width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .info-box {
            border-radius: 6px; padding: 10px 14px;
            font-size: 12px; line-height: 1.6; margin-bottom: 12px;
        }
        .info-company  { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: #fcd34d; }
        .info-hub      { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.2);  color: #86efac; }
        .info-delivery { background: rgba(167,139,250,0.08);border: 1px solid rgba(167,139,250,0.2);color: #c4b5fd; }
        .info-master   { background: rgba(79,142,247,0.08); border: 1px solid rgba(79,142,247,0.2); color: #93c5fd; }

        .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .chip {
            font-family: var(--mono); font-size: 10px;
            padding: 3px 8px; border-radius: 4px;
            background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
        }
        .chip b { color: var(--text); }

        /* RESPONSE */
        .response-panel {
            background: var(--surface); border-left: 1px solid var(--border);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .response-header {
            padding: 13px 16px; border-bottom: 1px solid var(--border);
            background: var(--surface2); display: flex; align-items: center; gap: 10px;
            position: sticky; top: 0;
        }
        .response-title { font-family: var(--mono); font-size: 12px; color: var(--muted); }
        .status-badge { font-family: var(--mono); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
        .s200 { background: rgba(34,197,94,0.15); color: #22c55e; }
        .s201 { background: rgba(79,142,247,0.15); color: #4f8ef7; }
        .s403 { background: rgba(239,68,68,0.15); color: #ef4444; }
        .s404 { background: rgba(245,158,11,0.15); color: #f59e0b; }

        .response-body {
            padding: 16px; font-family: var(--mono); font-size: 12px;
            line-height: 1.8; flex: 1; white-space: pre-wrap; word-break: break-all;
        }
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; gap: 8px;
            color: var(--muted); font-size: 12px; padding: 40px; text-align: center;
        }
        .empty-icon { font-size: 28px; opacity: .4; }
        .timing {
            padding: 8px 16px; border-top: 1px solid var(--border);
            display: flex; gap: 16px; font-family: var(--mono); font-size: 11px; color: var(--muted);
        }
        .timing span { color: var(--accent2); }

        /* 역할 설명 카드 */
        .role-intro {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px;
        }
        .role-intro-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .role-intro-desc  { font-size: 13px; color: var(--muted); line-height: 1.7; }
        .flow-steps {
            display: flex; flex-direction: column; gap: 4px; margin-top: 12px;
        }
        .flow-step {
            display: flex; align-items: center; gap: 10px;
            font-size: 12px; color: var(--muted); padding: 5px 0;
        }
        .flow-num {
            font-family: var(--mono); font-size: 10px;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-weight: 600;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Lucky<span>/</span>Logistics</div>
    <div class="badge">API Demo v2</div>
    <div class="badge" style="background:rgba(34,197,94,0.1);color:#22c55e;border-color:rgba(34,197,94,0.3);">order :19500</div>
    <div class="badge" style="background:rgba(167,139,250,0.1);color:#a78bfa;border-color:rgba(167,139,250,0.3);">notification :19700</div>
    <div class="server-status"><div class="dot"></div>서버 실행 중</div>
</header>

<!-- ROLE TABS -->
<div class="role-tabs">
    <div class="role-tab company active" onclick="switchRole('company')">
        <div class="role-dot"></div>
        업체 매니저
        <span class="role-count" id="count-company">3</span>
    </div>
    <div class="role-tab hub" onclick="switchRole('hub')">
        <div class="role-dot"></div>
        허브 매니저
        <span class="role-count" id="count-hub">2</span>
    </div>
    <div class="role-tab delivery" onclick="switchRole('delivery')">
        <div class="role-dot"></div>
        배송 담당자
        <span class="role-count" id="count-delivery">2</span>
    </div>
    <div class="role-tab master" onclick="switchRole('master')">
        <div class="role-dot"></div>
        마스터
        <span class="role-count" id="count-master">4</span>
    </div>
</div>

<aside id="sidebar"></aside>
<main id="main"></main>

<div class="response-panel">
    <div class="response-header">
        <span class="response-title">Response</span>
        <span id="statusBadge"></span>
        <span id="responseTime" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;"></span>
    </div>
    <div class="response-body" id="responseBody">
        <div class="empty-state">
            <div class="empty-icon">◎</div>
            <div>시나리오를 선택하고<br>요청을 보내면 여기에 응답이 표시됩니다</div>
        </div>
    </div>
    <div class="timing" id="timingBar" style="display:none;">
        시간: <span id="timingMs">—</span>ms &nbsp;|&nbsp; 서비스: <span id="timingSvc">—</span>
    </div>
</div>

<script>
    const ORDER_BASE = 'http://localhost:19500';
    const NOTI_BASE  = 'http://localhost:19700';

    const IDS = {
        master:          '00000000-0000-0000-0000-000000000001',
        companyManager:  '00000000-0000-0000-0000-000000000002',
        hubManager:      '00000000-0000-0000-0000-000000000003',
        deliveryDriver:  '00000000-0000-0000-0000-000000000004',
        order1:          '11111111-1111-1111-1111-111111111111',
        order2:          '22222222-2222-2222-2222-222222222222',
        order3:          '33333333-3333-3333-3333-333333333333',
        companyA:        'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa',
        companyB:        'bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb',
        product1:        'cccccccc-cccc-cccc-cccc-cccccccccccc',
        hub1:            'dddddddd-dddd-dddd-dddd-dddddddddddd',
        hub2:            'eeeeeeee-eeee-eeee-eeee-eeeeeeeeeeee',
        hub3:            'ffffffff-ffff-ffff-ffff-ffffffffffff',
        slackMsg1:       '55555555-5555-5555-5555-555555555555',
    };

    const roleScenarios = {
        company: {
            label: '업체 매니저',
            color: 'var(--role-company)',
            cls: 'company',
            intro: '업체 매니저는 본인 업체의 주문을 생성하고 조회할 수 있습니다.',
            flow: [
                '주문 생성 → 자동으로 배송 생성 + Slack 알림 발송',
                '본인 업체 소속 주문 목록 조회',
                '주문 단건 조회',
            ],
            scenarios: [
                {
                    key: 'company_createOrder',
                    method: 'POST', name: '주문 생성',
                    desc: '→ 배송생성 + Slack알림 자동 발송',
                    url: `${ORDER_BASE}/api/v1/orders`,
                    headers: { 'Content-Type':'application/json', 'X-User-Id': IDS.companyManager, 'X-User-Role':'COMPANY_MANAGER' },
                    body: {
                        requesterCompanyId: IDS.companyA,
                        receiverCompanyId: IDS.companyB,
                        productId: IDS.product1,
                        quantity: 10,
                        requestNote: '신선도 유지 필요. 4월 15일 오후 3시까지 도착 필수',
                        requestedDeadline: '2026-04-15T15:00:00'
                    },
                    info: '주문 생성 시 product → company → hub → user 서비스 순으로 정보를 수집하고, 재고 차감 → 배송 생성까지 처리됩니다. 배송 생성 완료 후 delivery-service가 notification-service를 호출해 Slack 알림이 자동 발송됩니다.',
                    chips: [{ k:'역할', v:'COMPANY_MANAGER' }, { k:'수량', v:'10개' }, { k:'납기', v:'2026-04-15' }]
                },
                {
                    key: 'company_getOrders',
                    method: 'GET', name: '내 업체 주문 조회',
                    desc: '담당 업체 주문만 조회',
                    url: `${ORDER_BASE}/api/v1/orders`,
                    headers: { 'X-User-Id': IDS.companyManager, 'X-User-Role':'COMPANY_MANAGER' },
                    info: 'COMPANY_MANAGER는 본인 소속 업체(requester/receiver) 주문만 조회됩니다. user-service에서 companyId를 확인해 필터링합니다.',
                    chips: [{ k:'역할', v:'COMPANY_MANAGER' }, { k:'범위', v:'본인 업체 주문만' }]
                },
                {
                    key: 'company_getOrder',
                    method: 'GET', name: '주문 단건 조회',
                    desc: '특정 주문 상세 확인',
                    url: `${ORDER_BASE}/api/v1/orders/${IDS.order1}`,
                    headers: { 'X-User-Id': IDS.companyManager, 'X-User-Role':'COMPANY_MANAGER' },
                    info: '모든 역할이 orderId로 단건 조회 가능합니다.',
                    chips: [{ k:'orderId', v: IDS.order1.slice(0,8)+'...' }]
                }
            ]
        },

        hub: {
            label: '허브 매니저',
            color: 'var(--role-hub)',
            cls: 'hub',
            intro: '허브 매니저는 담당 허브를 경유하는 주문을 조회하고 수정/취소할 수 있습니다.',
            flow: [
                '담당 허브 소속 주문 목록 조회',
                '주문 수정 (requestNote, deadline)',
            ],
            scenarios: [
                {
                    key: 'hub_getOrders',
                    method: 'GET', name: '담당 허브 주문 조회',
                    desc: '출발/도착 허브 기준 필터',
                    url: `${ORDER_BASE}/api/v1/orders`,
                    headers: { 'X-User-Id': IDS.hubManager, 'X-User-Role':'HUB_MANAGER' },
                    info: 'HUB_MANAGER는 user-service에서 소속 hubId를 조회한 뒤, originHubId 또는 destinationHubId가 일치하는 주문만 조회합니다.',
                    chips: [{ k:'역할', v:'HUB_MANAGER' }, { k:'범위', v:'담당 허브 경유 주문' }]
                },
                {
                    key: 'hub_updateOrder',
                    method: 'PATCH', name: '주문 수정',
                    desc: 'requestNote / deadline 수정',
                    url: `${ORDER_BASE}/api/v1/orders/${IDS.order1}`,
                    headers: { 'Content-Type':'application/json', 'X-User-Id': IDS.hubManager, 'X-User-Role':'HUB_MANAGER' },
                    body: { requestNote: '수정된 요청사항: 새벽 배송 불가', requestedDeadline: '2026-04-16T12:00:00' },
                    info: 'MASTER / HUB_MANAGER만 수정 가능합니다. CREATED 상태의 주문만 수정할 수 있습니다.',
                    chips: [{ k:'역할', v:'HUB_MANAGER' }, { k:'상태', v:'CREATED만 가능' }]
                }
            ]
        },

        delivery: {
            label: '배송 담당자',
            color: 'var(--role-delivery)',
            cls: 'delivery',
            intro: '배송 담당자 관점에서의 흐름입니다. 배송 경로 생성 완료 후 notification-service를 호출해 Slack 알림이 발송됩니다.',
            flow: [
                'delivery-service가 경로 탐색 완료 후 알림 발송 API 호출',
                'Gemini AI가 발송 시한 역산 → Slack 발송 → DB 저장',
            ],
            scenarios: [
                {
                    key: 'delivery_orderAlert',
                    method: 'POST', name: '주문 알림 발송 (시뮬레이션)',
                    desc: 'Gemini AI + Slack 자동 발송',
                    url: `${NOTI_BASE}/internal/v1/notifications/order-alert`,
                    headers: { 'Content-Type':'application/json', 'X-Internal-Request':'true' },
                    body: {
                        orderId: IDS.order1,
                        expectedTotalDurationSeconds: 23400,
                        expectedTotalDistanceMeter: 428000,
                        routes: [IDS.hub1, IDS.hub2, IDS.hub3]
                    },
                    info: 'delivery-service가 배송 경로 생성 완료 후 호출합니다. notification-service는 orderId로 주문 정보를 조회하고, hub-service에서 경유지 이름을 가져온 뒤 Gemini AI로 발송 시한을 계산하여 Slack 알림을 발송합니다.',
                    chips: [{ k:'소요', v:'390분 (23400초)' }, { k:'거리', v:'428km' }, { k:'경유지', v:'3곳' }]
                },
                {
                    key: 'delivery_getAiMessages',
                    method: 'GET', name: 'AI 메시지 조회',
                    desc: '발송 시한 계산 결과 확인',
                    url: `${NOTI_BASE}/api/v1/notifications/ai`,
                    headers: { 'X-User-Id': IDS.master, 'X-User-Role':'MASTER' },
                    info: 'Gemini AI의 발송 시한 계산 결과입니다. deadlineResult에 "최종 발송 시한: MM월 DD일 오전/오후 HH시 mm분" 형식으로 저장됩니다.',
                    chips: [{ k:'확인', v:'deadlineResult' }]
                }
            ]
        },

        master: {
            label: '마스터',
            color: 'var(--role-master)',
            cls: 'master',
            intro: '마스터는 모든 서비스에 접근할 수 있으며 전체 데이터를 조회/관리합니다.',
            flow: [
                '전체 주문 조회 (hubId / companyId / status 필터)',
                '주문 취소 / 삭제',
                '보안 검증 — 내부 API 헤더 없으면 403',
                'Slack 메시지 이력 조회',
            ],
            scenarios: [
                {
                    key: 'master_getOrders',
                    method: 'GET', name: '전체 주문 목록 조회',
                    desc: '모든 주문 + 필터 가능',
                    url: `${ORDER_BASE}/api/v1/orders?size=10`,
                    headers: { 'X-User-Id': IDS.master, 'X-User-Role':'MASTER' },
                    info: 'MASTER는 모든 주문을 조회합니다. hubId, companyId, status 파라미터로 필터링 가능하며 페이지 사이즈는 10/30/50만 허용됩니다.',
                    chips: [{ k:'역할', v:'MASTER' }, { k:'페이지', v:'10개' }]
                },
                {
                    key: 'master_cancelOrder',
                    method: 'PATCH', name: '주문 취소',
                    desc: 'CREATED 상태만 → 재고복원 + 배송취소',
                    url: `${ORDER_BASE}/api/v1/orders/${IDS.order2}/cancel`,
                    headers: { 'X-User-Id': IDS.master, 'X-User-Role':'MASTER' },
                    info: '주문 상태 검증 → 배송 상태 확인(WAITING만) → 재고 복원 → 배송 취소 순으로 처리됩니다.',
                    chips: [{ k:'처리', v:'상태검증→재고복원→배송취소' }]
                },
                {
                    key: 'master_403',
                    method: 'GET', name: '내부 API 403 (헤더 없음)',
                    desc: '보안 검증 — X-Internal-Request 필요',
                    url: `${ORDER_BASE}/internal/api/v1/orders/${IDS.order1}`,
                    headers: {},
                    info: 'X-Internal-Request 헤더 없이 /internal/** 경로 접근 시 InternalRequestFilter가 즉시 403을 반환합니다. GlobalExceptionHandler 이전에 처리됩니다.',
                    chips: [{ k:'예상', v:'403 ACCESS_DENIED' }]
                },
                {
                    key: 'master_getSlack',
                    method: 'GET', name: 'Slack 메시지 이력 조회',
                    desc: '발송된 알림 이력 확인',
                    url: `${NOTI_BASE}/api/v1/notifications/slack?size=10`,
                    headers: { 'X-User-Id': IDS.master, 'X-User-Role':'MASTER' },
                    info: '발송된 Slack 메시지 이력을 조회합니다. messageType=ORDER_NOTIFY 필터로 주문 알림만 볼 수 있습니다.',
                    chips: [{ k:'필터', v:'ORDER_NOTIFY / SYSTEM' }]
                }
            ]
        }
    };

    let currentRole = 'company';
    let currentScenarioKey = null;

    function switchRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.role-tab.${role}`).classList.add('active');
        renderSidebar();
        renderIntro();
        resetResponse();
    }

    function renderSidebar() {
        const r = roleScenarios[currentRole];
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = r.scenarios.map((s, i) => `
    <div class="api-item ${currentRole}-item ${currentScenarioKey === s.key ? 'active' : ''}"
         onclick="loadScenario('${s.key}')">
      <span class="method ${s.method}">${s.method}</span>
      <div>
        <div class="api-name">${s.name}</div>
        <div class="api-desc">${s.desc}</div>
      </div>
      <div class="step-badge">${i+1}</div>
    </div>
  `).join('');
    }

    function renderIntro() {
        const r = roleScenarios[currentRole];
        const main = document.getElementById('main');
        const flowHtml = r.flow.map((f, i) => `
    <div class="flow-step">
      <div class="flow-num" style="background:${r.color}22;color:${r.color}">${i+1}</div>
      <span>${f}</span>
    </div>
  `).join('');

        main.innerHTML = `
    <div class="role-intro" style="border-color:${r.color}33;">
      <div class="role-intro-title" style="color:${r.color}">
        ${r.label} 시나리오
      </div>
      <div class="role-intro-desc">${r.intro}</div>
      <div class="flow-steps">${flowHtml}</div>
    </div>
    <div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0;">
      왼쪽에서 시나리오를 선택하세요
    </div>
  `;
        currentScenarioKey = null;
    }

    function loadScenario(key) {
        let scenario = null;
        for (const role of Object.values(roleScenarios)) {
            const found = role.scenarios.find(s => s.key === key);
            if (found) { scenario = found; break; }
        }
        if (!scenario) return;

        currentScenarioKey = key;
        renderSidebar();

        const s = scenario;
        const r = roleScenarios[currentRole];

        const headerRows = Object.entries(s.headers).map(([k,v]) =>
            `<tr><td class="hkey">${k}</td><td class="hval">${v}</td></tr>`
        ).join('');

        const chipsHtml = (s.chips || []).map(c =>
            `<div class="chip"><b>${c.k}</b>: ${c.v}</div>`
        ).join('');

        document.getElementById('main').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <span class="method ${s.method}">${s.method}</span>
        <span class="panel-title">${s.name}</span>
      </div>
      <div class="panel-body">
        <div class="info-box info-${currentRole}">${s.info}</div>
        ${chipsHtml ? `<div class="chips">${chipsHtml}</div>` : ''}

        <div class="url-bar">
          <span class="method ${s.method}">${s.method}</span>
          <span class="url-path">${s.url}</span>
        </div>

        ${Object.keys(s.headers).length ? `
          <div class="body-label">HEADERS</div>
          <table class="headers-table">
            <thead><tr><th>Key</th><th>Value</th></tr></thead>
            <tbody>${headerRows}</tbody>
          </table>` : `
          <div style="font-size:12px;color:var(--muted);margin-bottom:12px;font-family:var(--mono);">
            // 헤더 없음 (403 예상)
          </div>`}

        ${s.body ? `
          <div class="body-label" style="margin-top:12px;">REQUEST BODY</div>
          <div class="code-block">${syntaxHighlight(JSON.stringify(s.body, null, 2))}</div>
        ` : ''}

        <button class="send-btn ${currentRole}-btn" id="sendBtn" onclick="sendRequest('${key}')">
          <span id="sendLabel">▶ 요청 보내기</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </div>
    </div>
  `;

        resetResponse();
    }

    function resetResponse() {
        document.getElementById('responseBody').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">◎</div>
      <div>요청을 보내면 응답이 여기에 표시됩니다</div>
    </div>`;
        document.getElementById('statusBadge').innerHTML = '';
        document.getElementById('responseTime').textContent = '';
        document.getElementById('timingBar').style.display = 'none';
    }

    function syntaxHighlight(json) {
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
            if (/^"/.test(m)) {
                if (/:$/.test(m)) return `<span class="jkey">${m}</span>`;
                return `<span class="jstr">${m}</span>`;
            }
            if (/true|false|null/.test(m)) return `<span style="color:#fb923c">${m}</span>`;
            return `<span class="jnum">${m}</span>`;
        });
    }

    async function sendRequest(key) {
        let scenario = null;
        for (const role of Object.values(roleScenarios)) {
            const found = role.scenarios.find(s => s.key === key);
            if (found) { scenario = found; break; }
        }
        if (!scenario) return;

        const s = scenario;
        const btn = document.getElementById('sendBtn');
        const label = document.getElementById('sendLabel');
        const spinner = document.getElementById('spinner');

        btn.classList.add('loading');
        btn.disabled = true;
        label.textContent = '요청 중...';
        spinner.style.display = 'block';

        const start = Date.now();
        try {
            const opts = { method: s.method, headers: { ...s.headers } };
            if (s.body) opts.body = JSON.stringify(s.body);

            const res = await fetch(s.url, opts);
            const elapsed = Date.now() - start;
            let data;
            try { data = await res.json(); } catch { data = null; }

            const sc = res.status;
            const scClass = sc >= 200 && sc < 300 ? (sc === 201 ? 's201' : 's200') : sc === 403 ? 's403' : 's404';
            document.getElementById('statusBadge').innerHTML =
                `<span class="status-badge ${scClass}">${sc} ${res.statusText || ''}</span>`;
            document.getElementById('responseTime').textContent = `${elapsed}ms`;
            document.getElementById('responseBody').innerHTML =
                data ? syntaxHighlight(JSON.stringify(data, null, 2))
                    : `<span style="color:var(--muted)">// 응답 본문 없음 (${sc})</span>`;

            const svc = s.url.includes('19700') ? 'notification-service' : 'order-service';
            document.getElementById('timingBar').style.display = 'flex';
            document.getElementById('timingMs').textContent = elapsed;
            document.getElementById('timingSvc').textContent = svc;

        } catch(e) {
            document.getElementById('responseBody').innerHTML =
                `<span style="color:var(--danger)">// 연결 실패: 서버가 실행 중인지 확인하세요\n// ${e.message}</span>`;
            document.getElementById('statusBadge').innerHTML =
                `<span class="status-badge s403">ERR</span>`;
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
            label.textContent = '▶ 요청 보내기';
            spinner.style.display = 'none';
        }
    }

    // 초기 로드
    renderSidebar();
    renderIntro();
</script>
</body>
</html>
